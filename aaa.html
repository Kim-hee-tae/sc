<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>Running Simulator – Professional Data Sync (Optimized)</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
  body { margin: 0; font-family: sans-serif; background: #f0f2f5; }
  #map { height: 65vh; position: relative; } 
  .control { display: flex; justify-content: center; padding: 40px 0 30px; border-top: 1px solid #ddd; background: #f0f2f5; }
  .panel { background: #fff; border-radius: 14px; padding: 18px; display: flex; gap: 14px; box-shadow: 0 4px 12px rgba(0,0,0,.1); }
  .course-list { width: 120px; border-right: 1px solid #ddd; }
  .course-list div { padding: 10px; cursor: pointer; border-radius: 8px; margin-bottom: 6px; text-align: center; background: #f5f5f5; white-space: nowrap; font-size: 14px; }
  .course-list div.active { background: #1e90ff; color: #fff; font-weight: bold; }
  .data { width: 200px; text-align: center; }
  input { width: 90px; text-align: center; font-size: 16px; margin-bottom: 5px; }
  button { margin: 4px; padding: 8px 12px; font-size: 14px; border-radius: 8px; cursor: pointer; border: 1px solid #ccc; background: #fff; transition: 0.2s; }
  button:hover:not(:disabled) { background: #f9f9f9; }
  button:disabled { background: #eee; cursor: not-allowed; color: #aaa; border: 1px solid #ddd; }
  #gpsStop:not(:disabled) { background: #fffbe6; border-color: #ffe58f; }
  .info { font-size: 14px; line-height: 1.6; margin-top: 8px; background: #fafafa; padding: 10px; border-radius: 8px; text-align: left; }
  .toggle-btn { display: none; margin-bottom: 10px; background: #eee; border: none; padding: 8px 12px; border-radius: 6px; width: 100%; }

  .custom-map-control {
    position: absolute; bottom: 20px; left: 20px; z-index: 1000;
    background: white; padding: 10px; border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.3); cursor: pointer;
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    border: none; font-size: 20px;
  }
  .custom-map-control:hover { background: #f4f4f4; }

  @media (max-width: 768px) {
    #map { height: 50vh; }
    .control { padding-top: 50px; padding-bottom: 40px; }
    .panel { flex-direction: column; align-items: center; width: 90vw; max-width: 420px; padding: 22px; }
    .course-list { width: 100%; display: flex; overflow-x: auto; border-right: none; border-bottom: 1px solid #ddd; padding-bottom: 8px; margin-bottom: 12px; }
    .course-list div { flex: 0 0 auto; min-width: 110px; margin-right: 8px; }
    .data { width: 100%; }
    .toggle-btn { display: block; }
    .panel.collapsed .info, .panel.collapsed .data-controls, .panel.collapsed .gps-section { display: none; }
  }
</style>
</head>

<body>
<div id="map">
  <button id="locateMe" class="custom-map-control" title="현재 위치로 이동">🎯</button>
</div>

<div class="control">
  <div class="panel" id="panel">
    <div class="course-list" id="courseList"></div>
    <div class="data">
      <button class="toggle-btn" id="toggleBtn">지표 접기 / 펼치기</button>
      <div class="data-controls">
        <strong>시뮬레이터 페이스</strong><br/>
        <input type="number" id="pace" value="430"> (mmss)<br/>
        <button id="startBtn">시작</button>
        <button id="pauseBtn">일시정지</button>
        <button id="resetBtn">리셋</button>
      </div>
      <div class="info">
        ⏱ 시간: <span id="time">00:00</span><br/>
        📏 거리: <span id="distance">0.00</span> km<br/>
        ⚡ 페이스: <span id="avgPace">-</span><br/>
        🏔 고도: <span id="elev">0</span> m / ⬆ 획득: <span id="gain">0</span> m<br/>
        📊 진행: <span id="progress">0</span>%<br/>
        ⏳ 예상: <span id="eta">-</span>
      </div>
      <div class="gps-section" style="margin-top:12px;border-top:1px dashed #ccc;padding-top:10px; background: #f0f7ff; border-radius: 8px;">
        <strong>📡 실시간 GPS 기록</strong><br/>
        <button id="gpsStart">위치시작</button>
        <button id="gpsStop" disabled>위치멈춤</button>
        <button id="gpsReset">위치리셋</button>
        <button id="gpxDownload" style="background:#4CAF50; color:white; border:none;">GPX 다운로드</button>
      </div>
    </div>
  </div>
</div>

<script>
// 1. 코스 데이터
const gogumaRoute = [[37.533688,126.912217],[37.533603,126.914041],[37.533348,126.916444],[37.532701,126.918590],[37.532259,126.920564],[37.531697,126.922216],[37.530897,126.924899],[37.530098,126.927302],[37.528991,126.929362],[37.528073,126.930928],[37.526694,126.932495],[37.525469,126.934211],[37.524005,126.936207],[37.522831,126.937666],[37.521963,126.938953],[37.520806,126.940198],[37.519836,126.940820],[37.518985,126.940863],[37.518253,126.940198],[37.517981,126.938782],[37.517521,126.936700],[37.517266,126.934125],[37.516926,126.931615],[37.516806,126.929448],[37.516926,126.927216],[37.517828,126.924641],[37.518951,126.921830],[37.519836,126.919727],[37.520840,126.918139],[37.522950,126.915972],[37.525741,126.914277],[37.527596,126.913247],[37.530880,126.911917],[37.532412,126.911380],[37.533280,126.911552],[37.533671,126.912067]];
const dangdangRoute = [[37.583460, 126.973886],[37.583009, 126.973693],[37.580424, 126.973758],[37.579464, 126.973844],[37.579319, 126.973833],[37.579430, 126.971462],[37.578554, 126.971703],[37.578686, 126.972213],[37.579400, 126.972025],[37.579391, 126.971451],[37.578422, 126.971816],[37.576003, 126.972755],[37.575846, 126.974165],[37.575807, 126.975340],[37.575327, 126.977191],[37.570042, 126.977577],[37.566904, 126.977352],[37.566904, 126.979208],[37.568630, 126.982759],[37.570025, 126.987619],[37.568426, 126.992383],[37.570229, 126.992276],[37.572559, 126.991525],[37.576947, 126.990173],[37.578562, 126.989357],[37.577219, 126.987319],[37.575586, 126.983242],[37.577202, 126.982534],[37.578494, 126.982234],[37.579901, 126.982384],[37.580973, 126.981617],[37.581466, 126.981053],[37.582303, 126.981869],[37.583213, 126.981901],[37.584233, 126.982094],[37.583876, 126.979755],[37.583451, 126.979401],[37.583723, 126.976161],[37.583451, 126.974026],[37.583460, 126.973940]];
const cosRoute = [[37.496448, 126.914513],[37.496789, 126.916627],[37.496925, 126.917539],[37.494286, 126.918579],[37.494363, 126.916401],[37.493571, 126.916380],[37.493647, 126.914921],[37.494328, 126.914696],[37.494950, 126.914824],[37.496397, 126.914384]];
const gunyoung = [[37.540966, 126.875975],[37.541260, 126.876592],[37.541404, 126.876485],[37.541604, 126.876061],[37.542144, 126.875852],[37.542765, 126.876045],[37.542889, 126.875938],[37.542787, 126.875680],[37.542574, 126.875466],[37.542476, 126.875213],[37.542332, 126.875144],[37.542225, 126.874881],[37.542344, 126.874596],[37.542255, 126.874425],[37.542319, 126.874339],[37.542315, 126.874189],[37.542315, 126.873980],[37.542289, 126.873840],[37.542221, 126.873744],[37.542127, 126.873282]];
const office = [[37.496520, 126.914953],[37.496886, 126.916798],[37.496963, 126.917447],[37.493652, 126.918815],[37.492771, 126.917979],[37.492524, 126.917801],[37.492047, 126.917903],[37.490702, 126.917555],[37.490736, 126.917276],[37.490553, 126.916509],[37.490519, 126.916251],[37.490285, 126.916031],[37.489502, 126.915666],[37.489285, 126.915817],[37.487369, 126.912625],[37.485999, 126.909079],[37.485037, 126.905812],[37.485313, 126.901853],[37.487484, 126.898034],[37.489178, 126.896746],[37.493222, 126.895266],[37.497333, 126.893957],[37.502594, 126.893377],[37.503317, 126.893249],[37.507547, 126.893849],[37.508415, 126.893549],[37.510198, 126.892138],[37.512747, 126.889933],[37.515913, 126.882756],[37.516287, 126.882412],[37.518610, 126.882058],[37.518551, 126.880449],[37.518517, 126.879290],[37.520942, 126.879290],[37.522857, 126.879344],[37.524371, 126.878861],[37.525350, 126.878228],[37.526890, 126.879462],[37.527128, 126.880159],[37.528302, 126.880664],[37.528813, 126.881415],[37.528719, 126.882852],[37.530021, 126.886479],[37.530812, 126.886994],[37.533773, 126.888582],[37.535126, 126.888914],[37.537567, 126.887434],[37.541421, 126.885277],[37.543174, 126.884429],[37.543693, 126.883872],[37.542816, 126.884290],[37.542604, 126.884129],[37.544067, 126.883271]];

const courses = { "고구마런 코스": gogumaRoute, "댕댕이런 코스": dangdangRoute, "코스1": cosRoute, "숲길": gunyoung, "office": office };

// 2. 초기화 및 전역 변수
var map = L.map('map').setView([37.533688, 126.912217], 15);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let route = gogumaRoute;
let baseLine, progressLine, runner;
let running=false, paused=false;
let seg=0, segDist=0, traveled=0, elapsed=0, lastTime=null, elevGain=0, lastElev=null, totalLen=0;
let wakeLock = null;
let locationLayer = L.layerGroup().addTo(map);

// 유틸리티 함수
const dist = (a,b) => { const R=6371000, dLat=(b[0]-a[0])*Math.PI/180, dLng=(b[1]-a[1])*Math.PI/180, x=Math.sin(dLat/2)**2 + Math.cos(a[0]*Math.PI/180)*Math.cos(b[0]*Math.PI/180)*Math.sin(dLng/2)**2; return 2*R*Math.atan2(Math.sqrt(x),Math.sqrt(1-x)); };
const interp = (a,b,t) => [a[0]+(b[0]-a[0])*t, a[1]+(b[1]-a[1])*t];
const paceSec = v => Math.floor(v/100)*60+(v%100);
const fmt = s => String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');
const elev = p => 20+Math.sin(p*Math.PI*4)*10;

// 3. 시뮬레이터 로직
function loadCourse(name){
  route = courses[name];
  if(baseLine) map.removeLayer(baseLine);
  if(progressLine) map.removeLayer(progressLine);
  if(runner) map.removeLayer(runner);
  baseLine = L.polyline(route,{color:'#1e90ff',weight:4, dashArray:'5,10'}).addTo(map);
  progressLine = L.polyline([],{color:'#7CFC00',weight:5}).addTo(map);
  runner = L.circleMarker(route[0],{radius:7,color:'red',fillOpacity:1}).addTo(map);
  map.fitBounds(baseLine.getBounds(),{padding:[60,60]});
  totalLen=0; for(let i=0;i<route.length-1;i++) totalLen+=dist(route[i],route[i+1]);
  resetBtn.click();
}

startBtn.onclick=() => {
  if(!running) { running=true; paused=false; seg=0; segDist=0; traveled=0; elapsed=0; elevGain=0; lastTime=null; lastElev=null; progressLine.setLatLngs([route[0]]); requestAnimationFrame(loop); }
  else if(paused) { paused=false; lastTime=null; requestAnimationFrame(loop); }
};
pauseBtn.onclick=()=>paused=true;
resetBtn.onclick=()=>{
  running=false; paused=false;
  ['time','distance','avgPace','elev','gain','progress','eta'].forEach(id => document.getElementById(id).innerText = (id==='distance'||id==='progress'?'0.0':(id==='avgPace'||id==='eta'?'-':'0')));
  document.getElementById('time').innerText = "00:00";
  if(progressLine) progressLine.setLatLngs([]); if(runner) runner.setLatLng(route[0]);
};

function loop(t){
  if(!running || paused) return;
  if(!lastTime) lastTime=t;
  const delta = (t-lastTime)/1000; elapsed += delta; lastTime=t;
  const speed = 1000/paceSec(+document.getElementById('pace').value||430);
  let move = speed * delta;
  while(move > 0 && seg < route.length - 1){
    const d = dist(route[seg], route[seg+1]), rem = d - segDist;
    if(move < rem){ segDist += move; traveled += move; move = 0; }
    else { move -= rem; traveled += rem; seg++; segDist = 0; }
  }
  const pos = seg < route.length - 1 ? interp(route[seg], route[seg+1], segDist/dist(route[seg], route[seg+1])) : route[route.length-1];
  runner.setLatLng(pos); progressLine.setLatLngs([...route.slice(0, seg+1), pos]);
  const prog = (traveled/totalLen)*100, curE = elev(prog/100);
  if(lastElev !== null && curE > lastElev) elevGain += (curE - lastElev); lastElev = curE;
  document.getElementById('time').innerText = fmt(elapsed);
  document.getElementById('distance').innerText = (traveled/1000).toFixed(2);
  document.getElementById('avgPace').innerText = fmt(paceSec(+document.getElementById('pace').value))+'/km';
  document.getElementById('elev').innerText = curE.toFixed(0);
  document.getElementById('gain').innerText = elevGain.toFixed(0);
  document.getElementById('progress').innerText = Math.min(prog, 100).toFixed(1);
  document.getElementById('eta').innerText = fmt(totalLen/speed);
  if(seg < route.length - 1) requestAnimationFrame(loop); else running = false;
}

// 4. GPS 추적 및 "🎯 현재위치" 최적화 섹션
let gpsWatch = null, gpsLine = null, gpsPoints = [], gpsStartMarker = null, gpsMarker = null;

// [개선] 현재 위치 버튼 기능
document.getElementById('locateMe').onclick = () => {
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      const latlng = [pos.coords.latitude, pos.coords.longitude];
      locationLayer.clearLayers();
      L.circle(latlng, { radius: pos.coords.accuracy, color: '#1e90ff', fillOpacity: 0.1, weight: 1 }).addTo(locationLayer);
      L.circleMarker(latlng, { radius: 8, color: 'white', fillColor: '#1e90ff', fillOpacity: 1, weight: 3 }).addTo(locationLayer);
      map.setView(latlng, 17);
    }, err => alert("위치 오류: " + err.message), { enableHighAccuracy: true });
  }
};

// [개선] GPS 트래킹 시작 (정확도 필터 완화 및 수신율 향상)
async function startTracking() {
  if ('wakeLock' in navigator) {
    try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {}
  }
  
  gpsWatch = navigator.geolocation.watchPosition(pos => {
    // [수정] 필터 조건을 100m로 완화하여 빠른 이동(자전거 등) 대응
    if(pos.coords.accuracy > 100) return; 

    const latlng = [pos.coords.latitude, pos.coords.longitude];
    gpsPoints.push(latlng);
    localStorage.setItem('running_gps_data', JSON.stringify(gpsPoints));

    if (!gpsLine) {
      gpsLine = L.polyline([], { color: 'yellow', weight: 5 }).addTo(map);
      gpsStartMarker = L.circleMarker(latlng, { radius: 7, color: 'green', fillOpacity: 1 }).addTo(map);
    }
    gpsLine.setLatLngs(gpsPoints);

    if (!gpsMarker) gpsMarker = L.circleMarker(latlng, { radius: 6, color: 'blue', fillOpacity: 1 }).addTo(map);
    else gpsMarker.setLatLng(latlng);

  }, err => {
    console.warn("GPS 수신 지연: " + err.message);
  }, { 
    enableHighAccuracy: true, 
    maximumAge: 0,      // 캐시 데이터 사용 안함 (실시간성 강화)
    timeout: 20000      // 타임아웃 20초로 연장
  });
}

gpsStart.onclick = () => {
  gpsPoints = []; localStorage.removeItem('running_gps_data');
  if (gpsLine) map.removeLayer(gpsLine);
  startTracking();
  gpsStart.disabled = true; gpsStop.disabled = false;
};

gpsStop.onclick = () => {
  if (gpsWatch) {
    navigator.geolocation.clearWatch(gpsWatch); gpsWatch = null;
    if(wakeLock) wakeLock.release(); 
    gpsStop.innerText = "위치재시작";
  } else {
    startTracking(); gpsStop.innerText = "위치멈춤";
  }
};

gpsReset.onclick = () => {
  if(gpsWatch) navigator.geolocation.clearWatch(gpsWatch);
  localStorage.removeItem('running_gps_data');
  [gpsLine, gpsMarker, gpsStartMarker].forEach(l => l && map.removeLayer(l));
  gpsLine = gpsMarker = gpsStartMarker = null; gpsPoints = [];
  gpsStart.disabled = false; gpsStop.disabled = true; gpsStop.innerText = "위치멈춤";
};

gpxDownload.onclick = () => {
  if (gpsPoints.length === 0) return alert("기록된 데이터가 없습니다.");
  let gpx = `<?xml version="1.0" encoding="UTF-8"?><gpx version="1.1" creator="GeminiRunner"><trk><trkseg>` + 
            gpsPoints.map(p => `<trkpt lat="${p[0]}" lon="${p[1]}"></trkpt>`).join('') + 
            `</trkseg></trk></gpx>`;
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([gpx], { type: "application/gpx+xml" }));
  a.download = "track.gpx"; a.click();
};

// 5. 코스 리스트 초기화
Object.keys(courses).forEach((name, i) => {
  const d = document.createElement('div'); d.innerText = name; if(i === 0) d.classList.add('active');
  d.onclick = () => {
    document.querySelectorAll('.course-list div').forEach(x => x.classList.remove('active'));
    d.classList.add('active'); loadCourse(name);
  };
  document.getElementById('courseList').appendChild(d);
});

loadCourse("고구마런 코스");
toggleBtn.onclick = () => document.getElementById('panel').classList.toggle('collapsed');
</script>
</body>
</html>
